name: CivSentinel-Backend

services:
  kafka_broker:
    image: apache/kafka:latest
    container_name: civsentinel-kafka
    ports:
      - "9092:9092"
    env_file:
      - kafka-broker.env

  kafka_topics:
    container_name: civsentinel-kafka-topics
    depends_on:
      - kafka_broker
    build:
      context: ./kafka-topics
      dockerfile: Dockerfile
    env_file:
      - kafka-topics/.env

  scraper:
    container_name: civsentinel-scraper
    build:
      context: ./scraper
      dockerfile: Dockerfile
    env_file:
      - scraper/.env

  scraper_pinger:
    container_name: civsentinel-scraper-pinger
    build:
      context: ./scraper-pinger
      dockerfile: Dockerfile
    env_file:
      - scraper-pinger/.env
    depends_on:
      - kafka_broker
      - kafka_topics
